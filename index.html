<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    background: #eee;
}

/* №1 — повторить страницу (картинка с тремя блоками и разным z-index) */
.wrap1 {
    position: relative;
    width: 400px;
    height: 300px;
    margin: 40px auto;
    background: #ffffff;
    border: 1px solid #ccc;
}
.z1 {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 150px;
    height: 150px;
    background: red;
    z-index: 3;
}
.z2 {
    position: absolute;
    top: 80px;
    left: 80px;
    width: 150px;
    height: 150px;
    background: green;
    z-index: 2;
}
.z3 {
    position: absolute;
    top: 120px;
    left: 120px;
    width: 150px;
    height: 150px;
    background: blue;
    z-index: 1;
}

/* №2 — второй образец с другими позициями */
.wrap2 {
    position: relative;
    width: 400px;
    height: 300px;
    margin: 40px auto;
    background: #ffffff;
    border: 1px solid #ccc;
}
.a1 {
    position: absolute;
    top: 20px;
    left: 200px;
    width: 160px;
    height: 160px;
    background: #ff5a5a;
    z-index: 1;
}
.a2 {
    position: absolute;
    top: 100px;
    left: 120px;
    width: 160px;
    height: 160px;
    background: #5aff5a;
    z-index: 2;
}
.a3 {
    position: absolute;
    top: 180px;
    left: 40px;
    width: 160px;
    height: 160px;
    background: #5a5aff;
    z-index: 3;
}

/* №3 — отрицательный z-index */
.wrap3 {
    position: relative;
    width: 300px;
    height: 200px;
    margin: 40px auto;
    background: #fff;
    border: 1px solid #ccc;
}
.front {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 150px;
    height: 150px;
    background: orange;
}
.back {
    position: absolute;
    top: 60px;
    left: 60px;
    width: 150px;
    height: 150px;
    background: purple;
    z-index: -1;
}
</style>
</head>
<body>

<div class="wrap1">
    <div class="z1"></div>
    <div class="z2"></div>
    <div class="z3"></div>
</div>

<div class="wrap2">
    <div class="a1"></div>
    <div class="a2"></div>
    <div class="a3"></div>
</div>

<div class="wrap3">
    <div class="front"></div>
    <div class="back"></div>
</div>

</body>
</html>
